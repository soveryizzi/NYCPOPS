<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>NYC POPS — Privately Owned Public Spaces</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#007263;--green-hover:#005c4e;--green-light:#e0f2ee;--green-text:#004d42;
  --blue:#00A6ED;--blue-light:#e0f5fe;--blue-text:#006fa8;
  --yellow:#F5CB5C;--yellow-light:#fef8e3;
  --slate:#95B8D1;--slate-light:#edf4f9;
  --dark:#242325;--white:#fff;
  --border:#dde8e6;--bg:#f4faf8;
  --ink:#242325;--ink2:#4a4a4a;--ink3:#7a8c88;
  --nav:52px;--sidebar:320px;
  --font:'Helvetica Neue',Helvetica,Arial,sans-serif;
}
html,body{height:100%;font-family:var(--font);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased}

/* ════════════════════════════════════════
   SHARED NAV BAR (desktop + mobile)
════════════════════════════════════════ */
#navbar{
  position:fixed;top:0;left:0;right:0;
  height:var(--nav);z-index:1000;
  background:var(--green);
  display:flex;align-items:center;gap:10px;
  padding:0 14px;
  box-shadow:0 2px 12px rgba(0,0,0,.15);
}
#nav-title{
  font-size:15px;font-weight:700;color:var(--white);
  white-space:nowrap;letter-spacing:-.2px;flex-shrink:0;
}
#nav-title span{color:var(--yellow)}
#nav-title small{
  display:block;font-size:9px;font-weight:400;
  color:rgba(255,255,255,.45);letter-spacing:0;margin-top:1px;
}

/* Search in navbar */
#nav-search-wrap{flex:1;position:relative;max-width:420px}
#nav-search{
  width:100%;padding:7px 36px 7px 12px;
  font-size:13px;font-family:var(--font);
  border:none;border-radius:20px;
  background:rgba(255,255,255,.15);
  color:var(--white);outline:none;
  transition:background .15s;
}
#nav-search::placeholder{color:rgba(255,255,255,.55)}
#nav-search:focus{background:rgba(255,255,255,.25)}
#nav-search-clear{
  position:absolute;right:10px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:rgba(255,255,255,.6);
  font-size:16px;cursor:pointer;display:none;line-height:1;padding:2px;
}
#nav-search-clear.show{display:block}

/* Borough select */
#nav-boro{
  padding:6px 10px;font-size:12px;font-family:var(--font);
  border:1.5px solid rgba(255,255,255,.3);border-radius:20px;
  background:transparent;color:var(--white);outline:none;cursor:pointer;
  flex-shrink:0;
}
#nav-boro option{color:var(--ink);background:var(--white)}

/* Hamburger */
#hamburger{
  width:36px;height:36px;border-radius:10px;flex-shrink:0;
  background:rgba(255,255,255,.15);border:none;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;
  cursor:pointer;transition:background .15s;
}
#hamburger:hover{background:rgba(255,255,255,.25)}
#hamburger span{width:18px;height:2px;background:var(--white);border-radius:1px;transition:all .2s}
#hamburger.open span:nth-child(1){transform:translateY(7px) rotate(45deg)}
#hamburger.open span:nth-child(2){opacity:0}
#hamburger.open span:nth-child(3){transform:translateY(-7px) rotate(-45deg)}

/* ════════════════════════════════════════
   FILTER DRAWER (drops from navbar)
════════════════════════════════════════ */
#filter-drawer{
  position:fixed;top:var(--nav);left:0;right:0;z-index:990;
  background:var(--white);border-bottom:1px solid var(--border);
  padding:14px 16px 16px;
  transform:translateY(-110%);
  transition:transform .22s cubic-bezier(.32,.72,0,1);
  box-shadow:0 4px 20px rgba(0,0,0,.1);
}
#filter-drawer.open{transform:translateY(0)}
#fd-label{font-size:10px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--ink3);margin-bottom:10px}
#fd-filters{display:flex;flex-wrap:wrap;gap:6px}
.fb{padding:5px 13px;font-size:12px;font-family:var(--font);border-radius:20px;border:1.5px solid var(--border);background:var(--white);color:var(--ink2);cursor:pointer;transition:all .12s;white-space:nowrap}
.fb:hover{border-color:var(--green);color:var(--green)}
.fb.on{background:var(--green);color:var(--white);border-color:var(--green)}
#fd-overlay{position:fixed;inset:0;z-index:980;display:none}
#fd-overlay.show{display:block}

/* ════════════════════════════════════════
   MAIN LAYOUT
════════════════════════════════════════ */
#app{
  display:flex;
  padding-top:var(--nav);
  height:100vh;height:100dvh;
}

/* ── DESKTOP SIDEBAR ── */
#sidebar{
  width:var(--sidebar);flex-shrink:0;
  display:flex;flex-direction:column;
  background:var(--white);
  border-right:1px solid var(--border);
  overflow:hidden;
}
#sb-meta{
  padding:10px 14px 8px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
}
#sb-meta span{font-size:11px;color:var(--ink3)}
#sb-meta strong{color:var(--ink);font-weight:600}
#sb-version{font-size:10px;color:var(--ink3)}

#legend{padding:8px 14px;border-bottom:1px solid var(--border);flex-shrink:0;display:flex;gap:14px}
.leg{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--ink2)}
.leg-icon{width:20px;height:20px;flex-shrink:0}

#list{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
#list::-webkit-scrollbar{width:3px}
#list::-webkit-scrollbar-track{background:transparent}
#list::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

.space-item{padding:11px 14px;border-bottom:1px solid var(--border);cursor:pointer;transition:background .1s;border-left:3px solid transparent}
.space-item:hover{background:var(--green-light)}
.space-item.active{background:var(--green-light);border-left-color:var(--green)}
.space-item.active .si-name{color:var(--green-text)}
.si-row{display:flex;align-items:flex-start;gap:8px}
.si-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px}
.si-dot-out{background:var(--green)}.si-dot-in{background:var(--blue)}
.si-content{flex:1;min-width:0}
.si-name{font-size:12.5px;font-weight:600;color:var(--ink);margin-bottom:2px;line-height:1.3}
.si-addr{font-size:11px;color:var(--ink3);margin-bottom:4px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.si-tags{display:flex;gap:4px;flex-wrap:wrap}
.si-tag{font-size:10px;padding:2px 7px;border-radius:20px;font-weight:500}
.si-tag-out{background:var(--green-light);color:var(--green-text)}
.si-tag-in{background:var(--blue-light);color:var(--blue-text)}
.si-tag-type{background:var(--slate-light);color:var(--ink2)}
#list-empty{padding:36px 18px;text-align:center;color:var(--ink3);font-size:13px;line-height:1.7}

/* ── MAP AREA ── */
#mapwrap{flex:1;position:relative;overflow:hidden}
#map{width:100%;height:100%}

/* ── DESKTOP DETAIL CARD ── */
#detail{
  position:absolute;top:16px;right:16px;width:300px;
  background:var(--white);border-radius:32px;
  box-shadow:0 8px 32px rgba(0,114,99,.15);
  z-index:600;display:none;overflow:hidden;
  animation:fadeUp .2s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
#detail.show{display:block}
#detail-close{
  position:absolute;top:12px;right:14px;
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;cursor:pointer;
  color:rgba(255,255,255,.8);background:rgba(0,0,0,.15);
  border:none;font-family:var(--font);z-index:1;
}
#detail-close:hover{background:rgba(0,0,0,.28)}
#d-header{padding:20px 20px 16px}
#d-header.out{background:var(--green)}
#d-header.in{background:var(--blue)}
#d-badge{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:rgba(255,255,255,.75);margin-bottom:8px}
#d-badge .badge-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.8)}
#d-name{font-size:15px;font-weight:700;color:var(--white);margin-bottom:3px;line-height:1.3;padding-right:28px}
#d-addr{font-size:11px;color:rgba(255,255,255,.6);line-height:1.4}
#detail-body{padding:16px 20px 20px}
#d-type-row{margin-bottom:12px}
.dtype{display:inline-block;font-size:11px;padding:4px 12px;border-radius:20px;font-weight:600}
.dtype-out{background:var(--green-light);color:var(--green-text)}
.dtype-in{background:var(--blue-light);color:var(--blue-text)}
#d-amenities-label{font-size:9.5px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--ink3);margin-bottom:8px}
#d-amenities{display:grid;grid-template-columns:1fr 1fr;gap:7px 8px;margin-bottom:14px}
.dam{display:flex;align-items:center;gap:7px;font-size:12px}
.dam-yes{color:var(--ink)}.dam-no{color:var(--ink3)}
.chk{width:18px;height:18px;border-radius:5px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:11px;font-weight:700}
.chk-yes{background:var(--green-light);color:var(--green)}
.chk-no{background:#f0f0f0;color:#bbb}
#d-hours{font-size:12px;color:var(--ink2);background:var(--yellow-light);border:1px solid #e8c040;border-radius:10px;padding:9px 12px;line-height:1.5;margin-bottom:10px}
#d-hours .hours-label{font-size:9.5px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--ink3);display:block;margin-bottom:2px}
#d-hours .hours-val{font-weight:600;color:var(--ink)}
#d-ada{display:flex;align-items:center;gap:8px;font-size:12px;border-radius:10px;padding:9px 12px}
#d-ada.ada-yes{background:var(--blue-light);color:var(--blue-text)}
#d-ada.ada-no{background:#f5f5f5;color:var(--ink3)}
#d-ada.ada-partial{background:var(--slate-light);color:#4a6a7a}
.ada-icon{font-size:16px;flex-shrink:0}
.ada-text strong{display:block;font-size:11px;font-weight:600;margin-bottom:1px}
.ada-text span{font-size:10.5px;opacity:.8}

/* ════════════════════════════════════════
   MOBILE — full-screen layout
════════════════════════════════════════ */

/* Mobile view toggle bar */
#mob-view-bar{
  display:none;
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  z-index:900;
  background:var(--dark);
  border-radius:24px;
  padding:4px;
  box-shadow:0 4px 20px rgba(0,0,0,.25);
  gap:2px;
}
.vbtn{
  padding:8px 20px;font-size:13px;font-weight:600;
  font-family:var(--font);border:none;border-radius:20px;
  cursor:pointer;transition:all .15s;color:rgba(255,255,255,.6);
  background:transparent;
}
.vbtn.active{background:var(--white);color:var(--ink)}

/* Mobile search results list */
#mob-results{
  display:none;
  position:fixed;top:var(--nav);left:0;right:0;bottom:0;
  z-index:700;background:var(--white);overflow-y:auto;
  -webkit-overflow-scrolling:touch;
}
#mob-results.show{display:block}
#mob-results-header{
  padding:10px 14px 8px;border-bottom:1px solid var(--border);
  font-size:11px;color:var(--ink3);
  position:sticky;top:0;background:var(--white);z-index:1;
}
#mob-results-header strong{color:var(--ink)}

/* Mobile panel — 50% height */
#panel{
  position:fixed;bottom:0;left:0;right:0;
  z-index:800;background:var(--white);
  border-radius:32px 32px 0 0;
  transform:translateY(100%);
  transition:transform .3s cubic-bezier(.32,.72,0,1);
  height:50%;
  overflow-y:auto;-webkit-overflow-scrolling:touch;
  display:none;
  box-shadow:0 -4px 32px rgba(0,0,0,.12);
}
#panel.open{transform:translateY(0)}
#panel-handle{width:40px;height:4px;background:rgba(255,255,255,.4);border-radius:2px;margin:14px auto 0;position:relative;z-index:3}
#pclose{
  position:absolute;top:12px;right:16px;
  width:28px;height:28px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;cursor:pointer;
  color:rgba(255,255,255,.8);background:rgba(0,0,0,.15);
  border:none;font-family:var(--font);z-index:3;
}
#pclose:hover{background:rgba(0,0,0,.28)}
#p-header{padding:16px 20px 16px;margin-top:0}
#p-header.out{background:var(--green);border-radius:32px 32px 0 0}
#p-header.in{background:var(--blue);border-radius:32px 32px 0 0}
#p-badge{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;color:rgba(255,255,255,.75);margin-bottom:8px}
#p-badge .badge-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.8)}
#p-name{font-size:18px;font-weight:700;color:var(--white);margin-bottom:3px;line-height:1.3;padding-right:34px}
#p-addr{font-size:12px;color:rgba(255,255,255,.6);line-height:1.4}
#p-body{padding:16px 20px 36px}
#p-type-row{margin-bottom:14px}
.ptype{display:inline-block;font-size:11px;padding:4px 12px;border-radius:20px;font-weight:600}
.ptype-out{background:var(--green-light);color:var(--green-text)}
.ptype-in{background:var(--blue-light);color:var(--blue-text)}
#p-amenities-label{font-size:9.5px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--ink3);margin-bottom:8px}
#p-amenities{display:grid;grid-template-columns:1fr 1fr;gap:9px 8px;margin-bottom:16px}
.pam{display:flex;align-items:center;gap:8px;font-size:13px}
.pam-yes{color:var(--ink)}.pam-no{color:var(--ink3)}
#p-hours{font-size:13px;color:var(--ink2);background:var(--yellow-light);border:1px solid #e8c040;border-radius:14px;padding:12px 14px;line-height:1.5;margin-bottom:12px}
#p-hours .hours-label{font-size:10px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:var(--ink3);display:block;margin-bottom:3px}
#p-hours .hours-val{font-weight:600;color:var(--ink);font-size:14px}
#p-ada{display:flex;align-items:center;gap:10px;font-size:13px;border-radius:14px;padding:12px 14px}
#p-ada.ada-yes{background:var(--blue-light);color:var(--blue-text)}
#p-ada.ada-no{background:#f5f5f5;color:var(--ink3)}
#p-ada.ada-partial{background:var(--slate-light);color:#4a6a7a}
.p-ada-icon{font-size:20px;flex-shrink:0}
.p-ada-text strong{display:block;font-size:12px;font-weight:700;margin-bottom:1px}
.p-ada-text span{font-size:11px;opacity:.75}

/* ── LOADING / ERROR ── */
#loading{position:fixed;inset:0;padding-top:var(--nav);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;background:rgba(244,250,248,.94);z-index:950;backdrop-filter:blur(4px)}
#loading p{font-size:13px;color:var(--ink3)}
.spinner{width:30px;height:30px;border:2.5px solid var(--border);border-top-color:var(--green);border-radius:50%;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#api-error{position:fixed;inset:0;padding-top:var(--nav);display:none;align-items:center;justify-content:center;flex-direction:column;gap:16px;background:rgba(244,250,248,.97);z-index:950;padding:24px;text-align:center}
#api-error.show{display:flex}
.err-icon{font-size:36px}.err-title{font-size:16px;font-weight:700;color:var(--ink)}
.err-msg{font-size:13px;color:var(--ink3);line-height:1.6;max-width:260px}
.err-detail{font-size:11px;color:var(--ink3);background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:8px 12px;max-width:300px;word-break:break-all;font-family:monospace}
.err-btn{margin-top:4px;padding:10px 24px;background:var(--green);color:var(--white);font-size:13px;font-weight:600;font-family:var(--font);border:none;border-radius:8px;cursor:pointer}
.err-btn:hover{background:var(--green-hover)}

/* Leaflet */
.leaflet-control-zoom{border:1px solid var(--border)!important;border-radius:8px!important;overflow:hidden;box-shadow:0 2px 8px rgba(0,114,99,.1)!important}
.leaflet-control-zoom a{color:var(--ink)!important;font-size:16px!important;line-height:28px!important}
.leaflet-control-zoom a:hover{background:var(--green-light)!important;color:var(--green)!important}
.leaflet-control-attribution{font-size:10px!important;background:rgba(255,255,255,.8)!important}

/* ════════════════════════════════════════
   RESPONSIVE BREAKPOINTS
════════════════════════════════════════ */
@media(min-width:641px){
  /* Desktop: hide mobile-only elements */
  #mob-view-bar{display:none!important}
  #mob-results{display:none!important}
  #panel{display:none!important}
  #nav-boro{display:flex}
}

@media(max-width:640px){
  /* Mobile: hide desktop-only elements */
  #sidebar{display:none}
  #detail{display:none!important}
  #nav-boro{display:none}

  /* Mobile app fills screen */
  #app{display:block;padding-top:var(--nav)}
  #mapwrap{height:100%;position:relative}

  /* Show mobile toggle + panel */
  #mob-view-bar{display:flex}
  #panel{display:block}
}
</style>
</head>
<body>

<!-- ═══════════════ NAVBAR ═══════════════ -->
<nav id="navbar">
  <div id="nav-title">
    NYC <span>Public</span> Spaces
    <small>Last updated: 2026-05-04 22:35:31 EDT</small>
  </div>
  <div id="nav-search-wrap">
    <input id="nav-search" type="text" placeholder="Search spaces, addresses…" autocomplete="off"/>
    <button id="nav-search-clear">&#215;</button>
  </div>
  <select id="nav-boro">
    <option value="">All boroughs</option>
    <option value="Manhattan">Manhattan</option>
    <option value="Brooklyn">Brooklyn</option>
    <option value="Queens">Queens</option>
    <option value="Bronx">Bronx</option>
    <option value="Staten Island">Staten Island</option>
  </select>
  <button id="hamburger" aria-label="Filters">
    <span></span><span></span><span></span>
  </button>
</nav>

<!-- ═══════════════ FILTER DRAWER ═══════════════ -->
<div id="fd-overlay"></div>
<div id="filter-drawer">
  <div id="fd-label">Filter by amenity</div>
  <div id="fd-filters">
    <button class="fb on" data-f="all">All</button>
    <button class="fb" data-f="outdoor">Outdoors</button>
    <button class="fb" data-f="indoor">Indoors</button>
    <button class="fb" data-f="seating">Seating</button>
    <button class="fb" data-f="trees">Trees</button>
    <button class="fb" data-f="food">Food</button>
    <button class="fb" data-f="restrooms">Restrooms</button>
    <button class="fb" data-f="water">Water</button>
  </div>
</div>

<!-- ═══════════════ MAIN APP ═══════════════ -->
<div id="app">

  <!-- Desktop sidebar -->
  <div id="sidebar">
    <div id="sb-meta">
      <span><strong id="shown-count">0</strong> spaces shown</span>
    </div>
    <div id="legend">
      <div class="leg">
        <svg class="leg-icon" viewBox="0 0 20 20"><circle cx="10" cy="8" r="7" fill="#007263"/><polygon points="10,18 6,11 14,11" fill="#007263"/><circle cx="10" cy="8" r="3.5" fill="white"/></svg>
        Outdoors
      </div>
      <div class="leg">
        <svg class="leg-icon" viewBox="0 0 20 20"><rect x="2" y="2" width="16" height="16" rx="3" fill="#00A6ED"/><rect x="6" y="6" width="8" height="8" rx="1.5" fill="white"/></svg>
        Indoors
      </div>
    </div>
    <div id="list"></div>
  </div>

  <!-- Map -->
  <div id="mapwrap">
    <div id="map"></div>

    <!-- Desktop detail card -->
    <div id="detail">
      <button id="detail-close">&#215;</button>
      <div id="d-header">
        <div id="d-badge"><span class="badge-dot"></span><span id="d-badge-label"></span></div>
        <div id="d-name"></div>
        <div id="d-addr"></div>
      </div>
      <div id="detail-body">
        <div id="d-type-row"></div>
        <div id="d-amenities-label">Amenities</div>
        <div id="d-amenities"></div>
        <div id="d-hours"></div>
        <div id="d-ada"></div>
      </div>
    </div>

    <!-- Loading + error -->
    <div id="loading"><div class="spinner"></div><p>Fetching live POPS data…</p></div>
    <div id="api-error">
      <div class="err-icon">⚠️</div>
      <div class="err-title">Couldn't load data</div>
      <div class="err-msg">The NYC Open Data API didn't respond. Check your connection and try again.</div>
      <div class="err-detail" id="err-detail-msg"></div>
      <button class="err-btn" onclick="location.reload()">Refresh page</button>
    </div>
  </div>
</div>

<!-- Mobile search results list (shown when searching on mobile) -->
<div id="mob-results">
  <div id="mob-results-header"><strong id="mob-res-count">0</strong> results</div>
  <div id="mob-results-list"></div>
</div>

<!-- Mobile: Map / List toggle pill -->
<div id="mob-view-bar">
  <button class="vbtn active" id="vbtn-map" onclick="setMobView('map')">Map</button>
  <button class="vbtn" id="vbtn-list" onclick="setMobView('list')">List</button>
</div>

<!-- Mobile slide-up panel (50% height) -->
<div id="panel">
  <div id="panel-handle"></div>
  <button id="pclose">&#215;</button>
  <div id="p-header">
    <div id="p-badge"><span class="badge-dot"></span><span id="p-badge-label"></span></div>
    <div id="p-name"></div>
    <div id="p-addr"></div>
  </div>
  <div id="p-body">
    <div id="p-type-row"></div>
    <div id="p-amenities-label">Amenities</div>
    <div id="p-amenities"></div>
    <div id="p-hours"></div>
    <div id="p-ada"></div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
// ── Field resolvers ──────────────────────────────────────────────────────────
function getName(r)    { return r.building_name || '' }
function getAddr(r)    { return r.building_address_with_zip || [r.address_number, r.street_name].filter(Boolean).join(' ') || '' }
function getBorough(r) { return r.borough_name || '' }
function getType(r)    { return r.public_space_type || '' }
function getLat(r)     { return parseFloat(r.latitude) }
function getLng(r)     { return parseFloat(r.longitude) }

const INDOOR_TYPES = ['atrium','arcade','gallery','covered','interior','enclosed','lobby','galleria'];
function isIndoor(r) {
  return INDOOR_TYPES.some(k => (r.public_space_type||'').toLowerCase().includes(k));
}
function getAmenity(r, keys) {
  const txt = (r.amenities_required||'').toLowerCase();
  if (!txt || txt === 'none') return false;
  return keys.some(k => txt.includes(k));
}

const AMENITIES = [
  { label:'Seating',        keys:['seating','seat'] },
  { label:'Trees / plants', keys:['trees','planting','landscap','shrub'] },
  { label:'Food service',   keys:['food','café','cafe','kiosk','vending'] },
  { label:'Restrooms',      keys:['restroom','bathroom','toilet'] },
  { label:'Water feature',  keys:['water','fountain','waterfall'] },
];

const FILTER_MAP = {
  outdoor:   r => !isIndoor(r),
  indoor:    r => isIndoor(r),
  seating:   r => getAmenity(r, ['seating','seat']),
  trees:     r => getAmenity(r, ['trees','planting','landscap','shrub']),
  food:      r => getAmenity(r, ['food','café','cafe','kiosk','vending']),
  restrooms: r => getAmenity(r, ['restroom','bathroom','toilet']),
  water:     r => getAmenity(r, ['water','fountain','waterfall']),
};

function isMobile() { return window.innerWidth <= 640 }

// ── Map init ─────────────────────────────────────────────────────────────────
const map = L.map('map', {zoomControl:false}).setView([40.745,-73.985], 12);
L.control.zoom({position:'bottomright'}).addTo(map);
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution:'&copy; <a href="https://openstreetmap.org">OSM</a> &copy; <a href="https://carto.com">CARTO</a> | <a href="https://data.cityofnewyork.us">NYC Open Data</a>',
  maxZoom:19
}).addTo(map);

let allData=[], filtered=[], markers=[], activeFilter='all', searchQ='', selBoro='', activeItem=null;
let mobView = 'map'; // 'map' | 'list'

// ── Icons ────────────────────────────────────────────────────────────────────
function makeOutdoorIcon(active) {
  const c = active ? '#005c4e' : '#007263';
  const s = active ? 26 : 20, h = s+7;
  return L.divIcon({html:`<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${h}" viewBox="0 0 26 32"><circle cx="13" cy="12" r="11" fill="${c}"/><polygon points="13,30 7,19 19,19" fill="${c}"/><circle cx="13" cy="12" r="5" fill="white" opacity=".95"/></svg>`, iconSize:[s,h], iconAnchor:[s/2,h], popupAnchor:[0,-h], className:''});
}
function makeIndoorIcon(active) {
  const c = active ? '#006fa8' : '#00A6ED';
  const s = active ? 26 : 20;
  return L.divIcon({html:`<svg xmlns="http://www.w3.org/2000/svg" width="${s}" height="${s}" viewBox="0 0 26 26"><rect x="1" y="1" width="24" height="24" rx="5" fill="${c}"/><rect x="8" y="8" width="10" height="10" rx="2" fill="white" opacity=".95"/></svg>`, iconSize:[s,s], iconAnchor:[s/2,s/2], popupAnchor:[0,-s/2], className:''});
}

// ── Render helpers ───────────────────────────────────────────────────────────
function amenityRows(r, cls, yes, no) {
  return AMENITIES.map(a => {
    const ok = getAmenity(r, a.keys);
    return `<div class="${cls} ${ok?yes:no}"><span class="chk ${ok?'chk-yes':'chk-no'}">${ok?'✓':'✕'}</span>${a.label}</div>`;
  }).join('');
}
function hoursBlock(r) {
  const h = r.hour_of_access_required || '';
  return `<span class="hours-label">Hours of access</span><span class="hours-val">${h||'Not listed'}</span>`;
}
function adaBlock(r) {
  const v = (r.physically_disabled||'').toLowerCase().trim();
  if (v==='full')           return {cls:'ada-yes',    icon:'♿', title:'Fully accessible',      sub:'ADA compliant'};
  if (v.includes('partial'))return {cls:'ada-partial', icon:'♿', title:'Partially accessible',  sub:'Some ADA features'};
  if (v==='none'||v==='no') return {cls:'ada-no',     icon:'♿', title:'Not accessible',         sub:'No ADA access listed'};
  return                           {cls:'ada-no',     icon:'♿', title:'Accessibility unknown',  sub:v||'No data'};
}
function adaHTML(r, ic, tc) {
  const a = adaBlock(r);
  return `<span class="${ic}">${a.icon}</span><div class="${tc}"><strong>${a.title}</strong><span>${a.sub}</span></div>`;
}

// ── Space card fill ──────────────────────────────────────────────────────────
function fillCard(r, prefix, indoorCls) {
  const ind = isIndoor(r), label = ind?'Indoors':'Outdoors';
  document.getElementById(`${prefix}-badge-label`).textContent = label;
  document.getElementById(`${prefix}-name`).textContent = getName(r)||'Unnamed space';
  document.getElementById(`${prefix}-addr`).textContent = [getBorough(r), getAddr(r)].filter(Boolean).join(' · ');
  document.getElementById(`${prefix}-header`).className = ind?'in':'out';
  const type = getType(r);
  document.getElementById(`${prefix}-type-row`).innerHTML = type ? `<span class="${prefix==='p'?'ptype':'dtype'} ${ind?(prefix==='p'?'ptype-in':'dtype-in'):(prefix==='p'?'ptype-out':'dtype-out')}">${type}</span>` : '';
  document.getElementById(`${prefix}-amenities`).innerHTML = prefix==='p'
    ? amenityRows(r,'pam','pam-yes','pam-no')
    : amenityRows(r,'dam','dam-yes','dam-no');
  document.getElementById(`${prefix}-hours`).innerHTML = hoursBlock(r);
  const ada = adaBlock(r);
  const adaEl = document.getElementById(`${prefix}-ada`);
  adaEl.className = ada.cls;
  adaEl.innerHTML = adaHTML(r, prefix==='p'?'p-ada-icon':'ada-icon', prefix==='p'?'p-ada-text':'ada-text');
}

// ── Desktop: select space ────────────────────────────────────────────────────
function selectSpace(r, mo) {
  fillCard(r, 'd', 'dtype');
  document.getElementById('detail').classList.add('show');
  document.querySelectorAll('.space-item').forEach(el => el.classList.remove('active'));
  if (mo?.listEl) { mo.listEl.classList.add('active'); mo.listEl.scrollIntoView({block:'nearest'}) }
  if (activeItem && activeItem!==mo) activeItem.layer.setIcon(isIndoor(activeItem.r)?makeIndoorIcon(false):makeOutdoorIcon(false));
  activeItem = mo;
  if (mo) mo.layer.setIcon(isIndoor(r)?makeIndoorIcon(true):makeOutdoorIcon(true));
}

// ── Mobile: open panel ───────────────────────────────────────────────────────
function openPanel(r) {
  fillCard(r, 'p', 'ptype');
  document.getElementById('panel').classList.add('open');
}
function closePanel() { document.getElementById('panel').classList.remove('open') }

function closeDetail() {
  document.getElementById('detail').classList.remove('show');
  if (activeItem) { activeItem.layer.setIcon(isIndoor(activeItem.r)?makeIndoorIcon(false):makeOutdoorIcon(false)); activeItem=null; }
  document.querySelectorAll('.space-item').forEach(el => el.classList.remove('active'));
}

document.getElementById('detail-close').addEventListener('click', closeDetail);
document.getElementById('pclose').addEventListener('click', closePanel);
map.on('click', () => { closeDetail(); closePanel(); });

// ── Mobile view toggle ───────────────────────────────────────────────────────
function setMobView(v) {
  mobView = v;
  document.getElementById('vbtn-map').classList.toggle('active', v==='map');
  document.getElementById('vbtn-list').classList.toggle('active', v==='list');
  const res = document.getElementById('mob-results');
  if (v === 'list') {
    res.classList.add('show');
    buildMobList();
    closePanel();
  } else {
    res.classList.remove('show');
  }
}

// ── Build sidebar list (desktop) ─────────────────────────────────────────────
function buildListItem(r, mo, forMobile) {
  const el = document.createElement('div');
  el.className = 'space-item';
  const ind = isIndoor(r), type = getType(r);
  el.innerHTML = `<div class="si-row">
    <span class="si-dot ${ind?'si-dot-in':'si-dot-out'}"></span>
    <div class="si-content">
      <div class="si-name">${getName(r)||'Unnamed'}</div>
      <div class="si-addr">${[getBorough(r),getAddr(r)].filter(Boolean).join(' · ')}</div>
      <div class="si-tags">
        <span class="si-tag ${ind?'si-tag-in':'si-tag-out'}">${ind?'Indoors':'Outdoors'}</span>
        ${type?`<span class="si-tag si-tag-type">${type}</span>`:''}
      </div>
    </div>
  </div>`;
  el.addEventListener('click', () => {
    const lat=getLat(r), lng=getLng(r);
    if (!isNaN(lat)&&!isNaN(lng)) map.panTo([lat,lng],{animate:true,duration:.4});
    if (forMobile) { setMobView('map'); openPanel(r); }
    else selectSpace(r, mo);
  });
  if (!forMobile && mo) mo.listEl = el;
  return el;
}

function buildList() {
  const list = document.getElementById('list');
  list.innerHTML = '';
  if (!filtered.length) {
    list.innerHTML = '<div id="list-empty">No spaces match.<br/>Try adjusting filters.</div>';
    return;
  }
  const frag = document.createDocumentFragment();
  filtered.forEach(({r,mo}) => frag.appendChild(buildListItem(r, mo, false)));
  list.appendChild(frag);
}

function buildMobList() {
  const list = document.getElementById('mob-results-list');
  list.innerHTML = '';
  document.getElementById('mob-res-count').textContent = filtered.length;
  if (!filtered.length) {
    list.innerHTML = '<div id="list-empty" style="padding:36px 18px;text-align:center;color:var(--ink3);font-size:13px;line-height:1.7">No spaces match.<br/>Try adjusting filters.</div>';
    return;
  }
  const frag = document.createDocumentFragment();
  filtered.forEach(({r,mo}) => frag.appendChild(buildListItem(r, mo, true)));
  list.appendChild(frag);
}

// ── Apply filters ────────────────────────────────────────────────────────────
function applyFilters() {
  const q = searchQ.toLowerCase();
  filtered = [];
  markers.forEach(mo => {
    const r = mo.r;
    const mS = !q || getName(r).toLowerCase().includes(q) || getAddr(r).toLowerCase().includes(q) || getBorough(r).toLowerCase().includes(q);
    const mB = !selBoro || getBorough(r).toLowerCase() === selBoro.toLowerCase();
    const mF = activeFilter==='all' || (FILTER_MAP[activeFilter]&&FILTER_MAP[activeFilter](r));
    if (mS && mB && mF) { map.addLayer(mo.layer); filtered.push({r,mo}); }
    else map.removeLayer(mo.layer);
  });
  document.getElementById('shown-count').textContent = filtered.length;
  buildList();
  if (isMobile() && mobView==='list') buildMobList();
  // On mobile: if user is searching, auto-show list view
  if (isMobile() && searchQ) setMobView('list');
}

// ── Build markers ────────────────────────────────────────────────────────────
function buildMarkers() {
  markers.forEach(({layer}) => { try{map.removeLayer(layer)}catch(e){} });
  markers = [];
  allData.forEach(r => {
    const lat=getLat(r), lng=getLng(r);
    if (!lat||!lng||isNaN(lat)||isNaN(lng)) return;
    const ind = isIndoor(r);
    const layer = L.marker([lat,lng], {icon: ind?makeIndoorIcon(false):makeOutdoorIcon(false)});
    const mo = {layer, r, listEl:null};
    layer.on('click', e => {
      e.originalEvent.stopPropagation();
      if (isMobile()) { setMobView('map'); openPanel(r); }
      else selectSpace(r, mo);
    });
    map.addLayer(layer);
    markers.push(mo);
  });
  console.log(`Built ${markers.length} markers`);
  applyFilters();
}

// ── Load data ────────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const res = await fetch('https://data.cityofnewyork.us/resource/rvih-nhyn.json?$limit=600');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    if (!data?.length) throw new Error('Empty response');
    allData = data;
    document.getElementById('loading').style.display = 'none';
    buildMarkers();
  } catch(e) {
    console.error('Load failed:', e);
    document.getElementById('loading').style.display = 'none';
    document.getElementById('err-detail-msg').textContent = e.message;
    document.getElementById('api-error').classList.add('show');
  }
}

// ── Hamburger / filter drawer ─────────────────────────────────────────────────
const hamburger = document.getElementById('hamburger');
const drawer = document.getElementById('filter-drawer');
const overlay = document.getElementById('fd-overlay');
function toggleDrawer(open) {
  hamburger.classList.toggle('open', open);
  drawer.classList.toggle('open', open);
  overlay.classList.toggle('show', open);
}
hamburger.addEventListener('click', () => toggleDrawer(!drawer.classList.contains('open')));
overlay.addEventListener('click', () => toggleDrawer(false));

document.querySelectorAll('#fd-filters .fb').forEach(b => {
  b.addEventListener('click', () => {
    document.querySelectorAll('#fd-filters .fb').forEach(x => x.classList.remove('on'));
    b.classList.add('on');
    activeFilter = b.dataset.f;
    applyFilters();
    toggleDrawer(false);
  });
});

// ── Search + borough controls ─────────────────────────────────────────────────
const navSearch = document.getElementById('nav-search');
const clearBtn = document.getElementById('nav-search-clear');

navSearch.addEventListener('input', e => {
  searchQ = e.target.value;
  clearBtn.classList.toggle('show', !!searchQ);
  applyFilters();
});
clearBtn.addEventListener('click', () => {
  navSearch.value = ''; searchQ = '';
  clearBtn.classList.remove('show');
  if (isMobile()) setMobView('map');
  applyFilters();
});
document.getElementById('nav-boro').addEventListener('change', e => {
  selBoro = e.target.value; applyFilters();
});

loadData();
</script>
</body>
</html>
